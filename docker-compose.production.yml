---
services:
  postgres:
    image: postgres:16
    container_name: weather-database
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: weather-redis-cache
    image: redis:8.6
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: [ "sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\" --appendonly yes" ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  tg_bot:
    container_name: weather-telegram-bot
    image: jackdemario/weather-forecast-bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

volumes:
  pgdata:
  redis-data: